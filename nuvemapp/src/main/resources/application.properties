spring.application.name=nuvemapp

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/nuvemapp?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

nuvemshop.client-secret=${NUVEM_CLIENT_SECRET}
nuvemshop.app-id=${NUVEM_APP_ID}

server.forward-headers-strategy=framework