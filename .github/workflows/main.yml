name: Deploy VPS Locaweb

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        working-directory: nuvemapp
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      - name: Prepare artifact
        working-directory: nuvemapp
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "*.jar" ! -name "*original*.jar" | head -n 1)
          test -n "$JAR_FILE"
          cp "$JAR_FILE" target/nuvemapp.jar

      - name: Copy jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "nuvemapp/target/nuvemapp.jar"
          target: "/home/andre/app/"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            sudo systemctl restart spring-boot
            sudo systemctl status spring-boot --no-pager